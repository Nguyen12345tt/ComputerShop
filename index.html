<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGear PC - Build & Buy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-gray-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider cursor-pointer"><i class="fa-solid fa-microchip mr-2"></i>TechGear</h1>
            <div class="relative w-1/3">
                <input type="text" id="searchInput" placeholder="Tìm kiếm PC..." class="w-full py-2 px-4 rounded-full text-gray-900 focus:outline-none">
                <i class="fa-solid fa-search absolute right-3 top-3 text-gray-500"></i>
            </div>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-shopping-cart text-2xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-xs text-white font-bold px-2 py-1 rounded-full">0</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto my-8 px-4">
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 justify-end">
        <div class="bg-white w-full md:w-96 h-full shadow-2xl flex flex-col slide-in">
            <div class="p-4 border-b flex justify-between items-center bg-gray-100">
                <h2 class="text-xl font-bold">Giỏ hàng của bạn</h2>
                <button onclick="toggleCart()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            <div id="cartItems" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                <p class="text-gray-500 text-center mt-10">Chưa có sản phẩm nào.</p>
            </div>
            <div class="p-4 border-t bg-gray-50">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>Tổng tiền:</span>
                    <span id="cartTotal" class="text-red-600">0đ</span>
                </div>
                <button onclick="checkoutAll()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition-colors">
                    Thanh toán ngay
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH API ---
        // Thay YOUR_WEB_APP_URL_HERE bằng Link Deploy Apps Script của bạn
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpflaFvw7536vms9PBGCwoaXcjBP3SveAtFZE69-SBLGSd-PWDGf3MUCqMAddYB-aD/exec';

        // Dữ liệu 6 bộ PC
        const pcs = [
            { id: 'pc1', name: 'PC Văn Phòng Basic', cpu: 'Core i3 12100', ram: '8GB DDR4', vga: 'Onboard', storage: '256GB SSD', price: 6500000, warranty: '12 Tháng', img: 'https://images.unsplash.com/photo-1593640408182-31c70c8268f5?auto=format&fit=crop&w=400&q=80' },
            { id: 'pc2', name: 'PC Gaming Esport', cpu: 'Core i5 12400F', ram: '16GB DDR4', vga: 'GTX 1660 Super', storage: '512GB NVMe', price: 12500000, warranty: '36 Tháng', img: 'https://images.unsplash.com/photo-1587831990711-23ca6441447b?auto=format&fit=crop&w=400&q=80' },
            { id: 'pc3', name: 'PC Đồ Họa Creator', cpu: 'Ryzen 7 5700X', ram: '32GB DDR4', vga: 'RTX 3060 12GB', storage: '1TB NVMe', price: 21000000, warranty: '36 Tháng', img: 'https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?auto=format&fit=crop&w=400&q=80' },
            { id: 'pc4', name: 'PC Gaming High-End', cpu: 'Core i7 13700K', ram: '32GB DDR5', vga: 'RTX 4070 Ti', storage: '1TB Gen4 NVMe', price: 45000000, warranty: '36 Tháng', img: 'https://images.unsplash.com/photo-1605648916319-cf082f7524a1?auto=format&fit=crop&w=400&q=80' },
            { id: 'pc5', name: 'PC Mini ITX Xinh xắn', cpu: 'Ryzen 5 7600', ram: '16GB DDR5', vga: 'RX 7600', storage: '512GB NVMe', price: 24500000, warranty: '24 Tháng', img: 'https://images.unsplash.com/photo-1555617782-b7e80a520eb0?auto=format&fit=crop&w=400&q=80' },
            { id: 'pc6', name: 'PC Server Workstation', cpu: 'Dual Xeon E5 2696 v3', ram: '64GB ECC', vga: 'Quadro P2000', storage: '2TB SSD', price: 30000000, warranty: '12 Tháng', img: 'https://images.unsplash.com/photo-1541807084-5c52b6b3adef?auto=format&fit=crop&w=400&q=80' }
        ];

        let cart = [];

        // Format tiền tệ VNĐ
        const formatPrice = (price) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(price);

        // Hiển thị danh sách PC
        function renderProducts(filterText = '') {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            const filtered = pcs.filter(pc => pc.name.toLowerCase().includes(filterText.toLowerCase()));
            
            filtered.forEach(pc => {
                grid.innerHTML += `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
                        <img src="${pc.img}" alt="${pc.name}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <h3 class="text-xl font-bold mb-2 text-gray-800">${pc.name}</h3>
                            <div class="text-sm text-gray-600 mb-4 space-y-1">
                                <p><i class="fa-solid fa-microchip w-5"></i> ${pc.cpu}</p>
                                <p><i class="fa-solid fa-memory w-5"></i> ${pc.ram}</p>
                                <p><i class="fa-solid fa-gamepad w-5"></i> ${pc.vga}</p>
                                <p><i class="fa-solid fa-hard-drive w-5"></i> ${pc.storage}</p>
                                <p class="text-green-600 font-semibold mt-2"><i class="fa-solid fa-shield-halved w-5"></i> Bảo hành: ${pc.warranty}</p>
                            </div>
                            <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
                                <span class="text-xl font-black text-red-600">${formatPrice(pc.price)}</span>
                                <button onclick="addToCart('${pc.id}')" class="bg-gray-900 text-white px-4 py-2 rounded shadow hover:bg-gray-800 transition">Mua ngay</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Logic Tìm kiếm
        document.getElementById('searchInput').addEventListener('input', (e) => renderProducts(e.target.value));

        // Bật/Tắt Giỏ hàng
        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // Tạo chuỗi ID random cho mỗi đơn hàng
        const generateOrderId = () => 'ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase();

        // Thêm vào giỏ & Gọi API Google Sheet
        async function addToCart(pcId) {
            const pc = pcs.find(p => p.id === pcId);
            const orderId = generateOrderId();
            
            const orderItem = { orderId: orderId, ...pc };
            cart.push(orderItem);
            
            updateCartUI();
            toggleCart();

            // Gọi API lưu ngay vào Google Sheet (Trạng thái: Đang trong giỏ hàng)
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Tránh lỗi preflight CORS từ Browser
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'add', id: orderId, pcName: pc.name, price: pc.price })
                });
                console.log("Đã đồng bộ đơn hàng lên Sheet");
            } catch (err) {
                console.error("Lỗi đồng bộ:", err);
            }
        }

        // Xóa khỏi giỏ & Gọi API Xóa khỏi Sheet
        async function removeFromCart(orderId) {
            cart = cart.filter(item => item.orderId !== orderId);
            updateCartUI();

            // Gọi API báo Sheet xóa dòng
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'delete', id: orderId })
                });
            } catch (err) {
                console.error("Lỗi xóa:", err);
            }
            if(cart.length === 0) toggleCart();
        }

        // Cập nhật giao diện giỏ hàng
        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const cartItemsContainer = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            cartItemsContainer.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center mt-10">Giỏ hàng trống.</p>';
            } else {
                cart.forEach(item => {
                    total += item.price;
                    cartItemsContainer.innerHTML += `
                        <div class="bg-white p-3 rounded-lg border shadow-sm flex flex-col">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-bold text-sm truncate">${item.name}</h4>
                                <span class="text-xs text-gray-400 ml-2">${item.orderId}</span>
                            </div>
                            <div class="flex justify-between items-center mt-auto pt-2 border-t border-dashed">
                                <span class="text-red-600 font-bold">${formatPrice(item.price)}</span>
                                <div class="flex gap-2">
                                    <button onclick="removeFromCart('${item.orderId}')" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200">
                                        <i class="fa-solid fa-trash"></i> Xóa
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            cartTotal.innerText = formatPrice(total);
        }

        // Thanh toán tất cả & Cập nhật Sheet
        async function checkoutAll() {
            if (cart.length === 0) return alert('Giỏ hàng đang trống!');
            
            alert('Đang xử lý thanh toán. Dữ liệu sẽ được cập nhật trên hệ thống!');
            
            // Cập nhật trạng thái "Đã thanh toán" cho từng order trong Sheet
            for (const item of cart) {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'checkout', id: item.orderId })
                    });
                } catch (err) {
                    console.error("Lỗi checkout:", err);
                }
            }
            
            // Xóa rỗng giỏ hàng UI sau khi thanh toán thành công
            cart = [];
            updateCartUI();
            toggleCart();
            alert('Thanh toán thành công!');
        }

        // Khởi tạo ban đầu
        renderProducts();
    </script>
</body>
</html>
