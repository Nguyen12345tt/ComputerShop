<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGear - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <aside class="bg-gray-900 text-white w-64 flex-shrink-0 hidden md:flex flex-col transition-all duration-300">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <h1 class="text-xl font-bold tracking-wider text-blue-400">
                <i class="fa-solid fa-microchip mr-2"></i>TechGear <span class="text-white text-sm font-normal">Admin</span>
            </h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg shadow">
                <i class="fa-solid fa-chart-pie w-5"></i> Tổng quan
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-desktop w-5"></i> Quản lý PC
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
            <h2 class="text-xl font-semibold text-gray-800 hidden md:block">Quản lý Sản Phẩm</h2>
            <div class="flex items-center gap-4 cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Admin" class="w-8 h-8 rounded-full">
                <span class="text-sm font-medium text-gray-700">Xin chào, Admin</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-800">Danh sách máy tính PC</h3>
                    <button onclick="openModal()" class="text-sm bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow transition flex items-center">
                        <i class="fa-solid fa-plus mr-2"></i> Thêm PC Mới
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 text-gray-600 font-medium border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-3">Tên cấu hình & Ảnh</th>
                                <th class="px-6 py-3">Thông số</th>
                                <th class="px-6 py-3">Giá bán</th>
                                <th class="px-6 py-3">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-gray-700" id="adminProductTable">
                            <tr><td colspan="4" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="productModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-800 text-lg">Thêm PC Mới</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên máy tính</label>
                    <input type="text" id="inputName" class="w-full px-4 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500" placeholder="VD: PC Gaming Msi...">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Link Ảnh minh họa (URL)</label>
                    <input type="text" id="inputImage" class="w-full px-4 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500" placeholder="VD: https://link-anh.com/pc.jpg">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hãng CPU</label>
                        <select id="inputCpu" class="w-full px-4 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500 bg-white">
                            <option value="Intel Core i3">Intel Core i3</option>
                            <option value="Intel Core i5">Intel Core i5</option>
                            <option value="Intel Core i7">Intel Core i7</option>
                            <option value="Intel Core i9">Intel Core i9</option>
                            <option value="AMD Ryzen 3">AMD Ryzen 3</option>
                            <option value="AMD Ryzen 5">AMD Ryzen 5</option>
                            <option value="AMD Ryzen 7">AMD Ryzen 7</option>
                            <option value="AMD Ryzen 9">AMD Ryzen 9</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Dung lượng RAM</label>
                        <select id="inputRam" class="w-full px-4 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500 bg-white">
                            <option value="4GB">4GB</option>
                            <option value="8GB">8GB</option>
                            <option value="16GB">16GB</option>
                            <option value="32GB">32GB</option>
                            <option value="64GB">64GB</option>
                            <option value="128GB">128GB</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ổ cứng</label>
                        <select id="inputStorage" class="w-full px-4 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500 bg-white">
                            <option value="256GB SSD">256GB SSD</option>
                            <option value="512GB SSD">512GB SSD</option>
                            <option value="1TB SSD">1TB SSD</option>
                            <option value="2TB SSD">2TB SSD</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giá bán (VNĐ)</label>
                    <input type="number" id="inputPrice" class="w-full px-4 py-2 border border-gray-200 rounded-lg outline-none focus:border-blue-500" placeholder="VD: 15000000">
                </div>
            </div>

            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 transition">Hủy</button>
                <button onclick="saveProduct()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md transition">Lưu Sản Phẩm</button>
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
